<!DOCTYPE html>
<html lang="en">

<title>ad101 Survey Explorer</title>
<style>

*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#fff;--bg2:#f7f7f7;--bg3:#f0f0f0;--bd:#e2e2e2;--bd2:#ccc;--tx:#111;--tx2:#555;--tx3:#999;--in:#5046E5;--inl:#8B82F0;--inxl:#EEEEFE;--gr:#10B981;--re:#EF4444;--am:#F59E0B;--r:8px;--rl:12px}
@media(prefers-color-scheme:dark){:root{--bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;--bd:#3a3a3c;--bd2:#48484a;--tx:#f2f2f7;--tx2:#aeaeb2;--tx3:#636366;--inxl:#1a1940}}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg3);color:var(--tx);font-size:13px;min-height:100vh}
.app{max-width:1440px;margin:0 auto;padding:16px}
.topbar{display:flex;align-items:center;justify-content:space-between;background:var(--bg);border:0.5px solid var(--bd);border-radius:var(--rl);padding:12px 18px;margin-bottom:14px;gap:12px;flex-wrap:wrap}
.brand{font-size:15px;font-weight:600}.brand em{color:var(--in);font-style:normal}
.apirow{display:flex;align-items:center;gap:8px}
.apirow label{font-size:11px;color:var(--tx3);white-space:nowrap}
.apirow input{font-size:12px;padding:5px 10px;border:0.5px solid var(--bd2);border-radius:var(--r);background:var(--bg);color:var(--tx);width:260px}
.fbuild{background:var(--bg);border:0.5px solid var(--bd);border-radius:var(--rl);padding:14px 16px;margin-bottom:14px}
.fbsw{position:relative;margin-bottom:12px}
.fbs{width:100%;font-size:13px;padding:8px 12px 8px 34px;border:1px solid var(--bd2);border-radius:var(--r);background:var(--bg);color:var(--tx)}
.fbs:focus{outline:none;border-color:var(--in)}
.fbic{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--tx3);pointer-events:none}
.fbsug{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--bg);border:0.5px solid var(--bd2);border-radius:var(--r);box-shadow:0 4px 16px rgba(0,0,0,.12);z-index:100;max-height:260px;overflow-y:auto}
.fbsi{padding:8px 12px;cursor:pointer;display:flex;align-items:center;gap:8px;font-size:12.5px}
.fbsi:hover{background:var(--inxl)}
.fbsi .tag{font-size:10px;padding:2px 7px;border-radius:10px;background:var(--bg2);color:var(--tx3);flex-shrink:0}
.segs{display:flex;gap:7px;flex-wrap:wrap;align-items:center}
.segl{font-size:11px;color:var(--tx3);white-space:nowrap}
.seg{font-size:11px;padding:4px 10px;border:0.5px solid var(--bd2);border-radius:20px;cursor:pointer;background:var(--bg2);color:var(--tx2);white-space:nowrap;font-family:inherit}
.seg:hover,.seg.on{background:var(--in);color:#fff;border-color:var(--in)}
.pills{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:12px}
.pill{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;padding:4px 10px;background:var(--inxl);color:var(--in);border-radius:20px;cursor:pointer;border:none;font-family:inherit}
.pill:hover{opacity:.8}.pill.ca{background:transparent;color:var(--tx3);border:0.5px solid var(--bd)}
.np{font-size:11px;color:var(--tx3)}
.stats{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:14px}
.stat{background:var(--bg);border:0.5px solid var(--bd);border-radius:var(--r);padding:13px 14px}
.stat .v{font-size:26px;font-weight:600;color:var(--in)}
.stat .l{font-size:11px;color:var(--tx2);margin-top:2px}
.stat .s{font-size:10.5px;color:var(--tx3);margin-top:1px}
.insight{background:var(--in);color:#fff;border-radius:var(--r);padding:10px 14px;margin-bottom:14px;font-size:12.5px;line-height:1.7}
.insight b{font-weight:600}
.charts{display:flex;flex-direction:column;gap:14px}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.card{background:var(--bg);border:0.5px solid var(--bd);border-radius:var(--rl);padding:15px}
.card h4{font-size:13px;font-weight:500;margin-bottom:13px;display:flex;align-items:center;gap:7px}
.v8b{font-size:10px;background:var(--gr);color:#fff;padding:2px 7px;border-radius:20px}
.bi{display:flex;align-items:center;gap:7px;margin-bottom:5px;cursor:pointer;border-radius:5px;padding:2px 4px;transition:background .12s}
.bi:hover,.bi.on{background:var(--inxl)}
.bl{font-size:11.5px;color:var(--tx2);flex-shrink:0;line-height:1.3;width:165px}
.bt{flex:1;height:15px;background:var(--bg3);border-radius:3px;overflow:hidden}
.bf{height:100%;border-radius:3px;transition:width .3s ease}
.bp{font-size:11px;color:var(--tx3);width:28px;text-align:right;flex-shrink:0}
.pw{display:flex;gap:14px;align-items:flex-start;flex-wrap:wrap}
.pl{display:flex;flex-direction:column;gap:4px}
.pli{display:flex;align-items:center;gap:6px;cursor:pointer;padding:2px 5px;border-radius:4px;transition:background .12s}
.pli:hover,.pli.on{background:var(--inxl)}
.pdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.pli strong{font-size:12px;color:var(--tx)}
.pli span{font-size:11px;color:var(--tx2);max-width:130px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.qa{background:var(--bg);border:0.5px solid var(--bd);border-radius:var(--rl);padding:15px}
.qa h4{font-size:13px;font-weight:500;margin-bottom:11px}
.qa-row{display:flex;gap:8px}
.qa-row input{flex:1;font-size:13px;padding:8px 12px;border:0.5px solid var(--bd2);border-radius:var(--r);background:var(--bg);color:var(--tx)}
.qa-row input:focus{outline:none;border-color:var(--in)}
.qa-btn{font-size:12px;padding:8px 16px;background:var(--in);color:#fff;border:none;border-radius:var(--r);cursor:pointer;font-weight:500;font-family:inherit}
.qa-btn:disabled{opacity:.4;cursor:default}
.qa-chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px}
.qc{font-size:11px;padding:3px 9px;border:0.5px solid var(--bd);border-radius:20px;cursor:pointer;color:var(--tx2);background:var(--bg2);font-family:inherit}
.qc:hover{border-color:var(--in);color:var(--in)}
.qa-ans{margin-top:12px;font-size:13px;line-height:1.75;border-left:3px solid var(--in);padding:11px 13px;background:var(--inxl);border-radius:0 var(--r) var(--r) 0}
.qa-wait{color:var(--tx3);font-style:italic;font-size:12px;margin-top:10px}
@media(max-width:960px){.r2{grid-template-columns:1fr}.stats{grid-template-columns:repeat(3,1fr)}}


.card{background:var(--bg);border:0.5px solid var(--bd);border-radius:var(--rl);padding:15px}
.card-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:13px;gap:8px}
.card-head h4{font-size:13px;font-weight:500;display:flex;align-items:center;gap:7px;flex:1;line-height:1.4;margin:0}
.card-tools{display:flex;align-items:center;gap:5px;flex-shrink:0}
.tool-btn{font-size:11px;padding:3px 8px;border:0.5px solid var(--bd2);border-radius:var(--r);cursor:pointer;background:var(--bg2);color:var(--tx2);font-family:inherit;white-space:nowrap}
.tool-btn:hover,.tool-btn.active{background:var(--in);color:#fff;border-color:var(--in)}
.tool-btn-lg{font-size:12px;padding:5px 12px;border:0.5px solid var(--bd2);border-radius:var(--r);cursor:pointer;background:var(--bg2);color:var(--tx2);font-family:inherit}
.tool-btn-lg:hover,.tool-btn-lg.active{background:var(--in);color:#fff;border-color:var(--in)}
.topbar-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.nbad{font-size:10px;padding:2px 7px;border-radius:20px;white-space:nowrap;font-weight:500}
.nbad.ok{background:#D1FAE5;color:#065F46}.nbad.amber{background:#FEF3C7;color:#92400E}.nbad.red{background:#FEE2E2;color:#991B1B}
@media(prefers-color-scheme:dark){.nbad.ok{background:#064E3B;color:#6EE7B7}.nbad.amber{background:#451A03;color:#FCD34D}.nbad.red{background:#450A0A;color:#FCA5A5}}
.disp-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.disp-left,.disp-right{display:flex;gap:6px;flex-wrap:wrap}
.disp-btn{font-size:11px;padding:4px 10px;border:0.5px solid var(--bd2);border-radius:20px;cursor:pointer;background:var(--bg2);color:var(--tx2);font-family:inherit}
.disp-btn:hover,.disp-btn.on{background:var(--in);color:#fff;border-color:var(--in)}
.cmp-banner{background:#FEF3C7;border:0.5px solid #F59E0B;border-radius:var(--r);padding:8px 14px;margin-bottom:12px;font-size:12px;color:#92400E;display:flex;align-items:center;flex-wrap:wrap;gap:6px}
@media(prefers-color-scheme:dark){.cmp-banner{background:#451A03;border-color:#B45309;color:#FCD34D}}
.cmp-legend{display:flex;align-items:center;gap:8px;margin-top:8px;font-size:11px;color:var(--tx3)}
.cmp-legend span{display:inline-block;width:24px;height:8px;border-radius:3px}
.cmp-val{font-size:10px;color:var(--tx3);margin-left:4px}
.delta-up .bl{color:var(--in);font-weight:500}
.delta-dn .bl{color:var(--re);font-weight:500}
.bf.cmp{margin-top:2px}
.drawer{position:fixed;right:0;top:0;bottom:0;width:440px;background:var(--bg);border-left:0.5px solid var(--bd2);z-index:200;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s ease}
.drawer.open{transform:translateX(0)}
.drawer-head{padding:14px 16px;border-bottom:0.5px solid var(--bd);display:flex;align-items:center;justify-content:space-between;font-size:13px;font-weight:500;flex-shrink:0}
.drawer-body{flex:1;overflow-y:auto;padding:12px 16px}
.oe-item{padding:10px 0;border-bottom:0.5px solid var(--bd)}
.oe-meta{font-size:11px;color:var(--tx3);margin-bottom:4px}
.oe-text{font-size:13px;color:var(--tx);line-height:1.6}
.seg-pill{background:#EEF0FE;color:var(--in)}
.v8b{font-size:10px;background:var(--gr);color:#fff;padding:2px 7px;border-radius:20px}

</style>

    const inAlias=fd.aliases.some(a=>a.includes(ql)||ql.includes(a.split(" ")[0]));
    const matchOpts=fd.opts.filter(o=>getDisp(o).toLowerCase().includes(ql)||String(o).toLowerCase().includes(ql));
    if(matchOpts.length)matchOpts.slice(0,3).forEach(o=>results.push({fd,value:o,score:3}));
    else if(inAlias)fd.opts.slice(0,3).forEach(o=>results.push({fd,value:o,score:2}));
  }
  results.sort((a,b)=>b.score-a.score);
  const seen=new Set();
  return results.filter(r=>{const k=r.fd.key+":"+r.value;if(seen.has(k))return false;seen.add(k);return true;}).slice(0,9);
}

function applyFilter(fd,val){
  if(fd.multi){
    const cur=F[fd.key];
    if(Array.isArray(cur)){
      if(cur.includes(val)){F[fd.key]=cur.filter(x=>x!==val);if(!F[fd.key].length)delete F[fd.key];}
      else F[fd.key]=[...cur,val];
    }else F[fd.key]=[val];
  }else{
    if(F[fd.key]===val)delete F[fd.key];
    else F[fd.key]=val;
  }
}

function nBadge(n){
  if(n<10)return `<span class="nbad red" title="n=${n}: too small to cite">n=${n}</span>`;
  if(n<30)return `<span class="nbad amber" title="n=${n}: directional only">n=${n}</span>`;
  return `<span class="nbad ok" title="n=${n}">n=${n}</span>`;
}

function valDisplay(item,n){
  if(countMode==="pct")return `${item.pct}%`;
  if(countMode==="count")return String(item.n);
  return `${item.pct}% <span style="opacity:.6;font-size:10px">(${item.n})</span>`;
}

function deltaClass(a,b){
  const d=a-b;
  if(Math.abs(d)<10)return "";
  return d>0?"delta-up":"delta-dn";
}

function insight(rows){
  const n=rows.length||1;
  const conf=rows.filter(r=>r.gut&&r.gut.includes("confident")).length;
  const active=rows.filter(r=>r.ad_status&&r.ad_status.includes("actively")).length;
  const burned=rows.filter(r=>r.ad_status&&r.ad_status.includes("wasting")).length;
  const hi=rows.filter(r=>r.budget&&(r.budget.includes("$1,000")||r.budget.includes("$3,000")||r.budget.includes("$5,000")||r.budget.includes("Over"))).length;
  const aipos=rows.filter(r=>r.ai_attitude&&(r.ai_attitude.includes("Open to it")||r.ai_attitude.includes("comfortable"))).length;
  return[
    `<b>${Math.round(conf/n*100)}%</b> feel confident`,
    `<b>${Math.round(active/n*100)}%</b> actively advertising, want better results`,
    burned?`<b>${Math.round(burned/n*100)}%</b> tried and felt burned`:"",
    `<b>${Math.round(hi/n*100)}%</b> spend $1K+/month`,
    `<b>${Math.round(aipos/n*100)}%</b> open to or using AI`,
  ].filter(Boolean).join(" &middot; ");
}

function exportSummary(rows){
  const n=rows.length;
  const v5n=rows.filter(r=>r.survey==="v5").length;
  const v8n=rows.filter(r=>r.survey==="v8").length;
  function fqs(arr,mx){const c={};arr.forEach(v=>{if(v)c[v]=(c[v]||0)+1;});const tot=arr.filter(Boolean).length||1;return Object.entries(c).sort((a,b)=>b[1]-a[1]).slice(0,mx||3).map(([k,ct])=>k+" ("+Math.round(ct/tot*100)+"%)").join(", ");}
  function mfqs(rows,fld,mx){const c={};rows.forEach(r=>{(r[fld]||[]).forEach(v=>{if(v)c[v]=(c[v]||0)+1;});});const tot=rows.length||1;return Object.entries(c).sort((a,b)=>b[1]-a[1]).slice(0,mx||3).map(([k,ct])=>k+" ("+Math.round(ct/tot*100)+"%)").join(", ");}
  const activeFilters=Object.entries(F).filter(([,v])=>v).map(([k,v])=>k+": "+JSON.stringify(v)).join(", ");
  const activeSegNames=[...activeSegs].map(i=>SEG_DEFS[i].label).join(", ");
  return `ad101 Survey Snapshot — ${new Date().toLocaleDateString()}
Segment: ${activeFilters||activeSegNames||"Full sample"} | n=${n} (Original SMB Survey (1): ${v5n}, Online/Hybrid 2: ${v8n})

Advertising mindset: ${fqs(rows.map(r=>r.gut),3)}
Advertising status: ${fqs(rows.map(r=>r.ad_status),3)}
Monthly budget: ${fqs(rows.map(r=>r.budget),3)}
AI attitude: ${fqs(rows.map(r=>r.ai_attitude),3)}
Hardest parts: ${mfqs(rows,"hard_parts",3)}
Worries: ${mfqs(rows,"worries",3)}
Current channels: ${mfqs(rows,"channels",3)}
${v8n>0?"Success definition (v8): "+mfqs(rows.filter(r=>r.survey==="v8"),"success_def",3):""}
Industry: ${fqs(rows.map(r=>r.industry),3)}
Revenue: ${fqs(rows.map(r=>r.revenue),3)}`;
}

function pieChart(items,title,fdkey,sm,cmpItems){
  const rows=filtered();
  const n=rows.length;
  const shown=items.slice(0,6);
  const sz=110,cx=55,cy=55,r=48;
  let ang=-Math.PI/2;
  const fullQ=QT[fdkey]||"";
  const k=JSON.stringify(fdkey);
  const slices=shown.map((item,i)=>{
    const a=(item.pct/100)*2*Math.PI;
    const ea=ang+a;
    const x1=(cx+Math.cos(ang)*r).toFixed(1),y1=(cy+Math.sin(ang)*r).toFixed(1);
    const x2=(cx+Math.cos(ea)*r).toFixed(1),y2=(cy+Math.sin(ea)*r).toFixed(1);
    const lg=a>Math.PI?1:0;
    const d=`M${cx},${cy}L${x1},${y1}A${r},${r} 0 ${lg},1 ${x2},${y2}Z`;
    const on=F[fdkey]===item.key;
    const v=JSON.stringify(item.key);
    const cmpItem=cmpItems&&cmpItems.find(c=>c.key===item.key);
    ang=ea;
    return{d,c:P[i],item,on,v,k,cmpItem};
  });
  const disp=item=>(sm&&sm[item.key])||(showFullQ?item.label:ht(item.label,26));
  return `<div class="card">
    <div class="card-head">
      <h4>${hx(showFullQ&&fullQ?fullQ:title)}</h4>
      <div class="card-tools">
        ${nBadge(n)}

        ${!cmpMode?`<button class="tool-btn" onclick="pinCmp()">Pin A</button>`:""}
      </div>
    </div>
    <div class="pw">
    <svg width="${sz}" height="${sz}" style="flex-shrink:0">${
      slices.map(s=>`<path d="${s.d}" fill="${s.c}" opacity="${s.on?1:.83}" stroke="var(--bg)" stroke-width="1.5" style="cursor:pointer" onclick="tf(${s.k},${s.v},false)"/>`)
    .join("")}</svg>
    <div class="pl">${slices.map(s=>{
      const dc=s.cmpItem?deltaClass(s.item.pct,s.cmpItem.pct):"";
      return `<div class="pli${s.on?" on":""} ${dc}" onclick="tf(${s.k},${s.v},false)">
        <div class="pdot" style="background:${s.c}"></div>

          <span title="${hx(s.item.key)}">${hx(disp(s.item))}</span>

    }).join("")}</div>

  </div>`;
}

// Global handlers
window.tf=function(k,val,multi){const fd=FILTERS.find(f=>f.key===k);if(fd)applyFilter(fd,val);render();};
window.afd=function(k,val,multi){const fd=FILTERS.find(f=>f.key===k);if(fd){applyFilter(fd,val);searchVal="";showSug=false;}render();};
window.rp=function(k,val){
  if(Array.isArray(F[k])){F[k]=F[k].filter(x=>x!==val);if(!F[k].length)delete F[k];}
  else delete F[k];
  render();
};
window.clearAll=function(){F={};activeSegs=new Set();render();};
window.toggleSeg=function(i){if(activeSegs.has(i))activeSegs.delete(i);else activeSegs.add(i);render();};
window.setSearch=function(v){
  searchVal=v;
  // Update suggestions with slight debounce to avoid jank while typing
  clearTimeout(window._searchTimer);
  window._searchTimer=setTimeout(function(){render();},120);
};
window.openSug=function(){showSug=true;render();};
window.closeSug=function(){setTimeout(function(){showSug=false;render();},200);};
window.render=render;
window.toggleFullQ=function(){showFullQ=!showFullQ;render();};
window.toggleDrawer=function(){drawerOpen=!drawerOpen;render();};
window.closeDrawer=function(){drawerOpen=false;render();};
window.cycleCount=function(){countMode=countMode==="pct"?"both":countMode==="both"?"count":"pct";render();};
window.setCount=function(m){countMode=m;render();};
window.pinCmp=function(){
  cmpRows=filtered();
  const segs=[...activeSegs].map(i=>SEG_DEFS[i].label);
  const filters=Object.entries(F).filter(([,v])=>v).map(([k,v])=>Array.isArray(v)?v.join(", "):v);
  cmpLabel=segs.concat(filters).join(" + ")||"All respondents";
  cmpLabel+=` (n=${cmpRows.length})`;
  cmpMode=true;
  render();
};
window.clearCmp=function(){cmpMode=false;cmpRows=null;cmpLabel="";render();};
window.sq=function(q){const el=document.getElementById("qai");if(el)el.value=q;};
window.copyExport=function(){
  const rows=filtered();
  const txt=exportSummary(rows);
  navigator.clipboard.writeText(txt).then(()=>{
    const btn=document.querySelector("[onclick=\"copyExport()\"]");
    if(btn){const orig=btn.innerHTML;btn.innerHTML="Copied!";setTimeout(()=>{btn.innerHTML=orig;},1800);}
  }).catch(()=>alert(exportSummary(rows)));
};


render();
})();


</script>
